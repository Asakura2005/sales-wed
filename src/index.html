<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Bán Hàng</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="login-icon">
            <i class="fas fa-store"></i>
          </div>
          <h1>App Bán Hàng</h1>
          <p>Đăng nhập để tiếp tục</p>
        </div>
        <form id="login-form" class="login-form">
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="login-username" placeholder="Tên đăng nhập" required autocomplete="off">
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="login-password" placeholder="Mật khẩu" required>
          </div>
          <div id="login-error" class="login-error" style="display:none;"></div>
          <button type="submit" class="btn btn-primary btn-login">
            <i class="fas fa-sign-in-alt"></i> Đăng nhập
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app-screen" class="app-screen" style="display:none;">
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <i class="fas fa-store"></i>
        </div>
        <h2>App Bán Hàng</h2>
      </div>
      <ul class="sidebar-menu">
        <li class="menu-item active" data-page="dashboard">
          <i class="fas fa-tachometer-alt"></i>
          <span>Tổng quan</span>
        </li>
        <li class="menu-item" data-page="pos">
          <i class="fas fa-cash-register"></i>
          <span>Bán hàng</span>
        </li>
        <li class="menu-item" data-page="orders">
          <i class="fas fa-receipt"></i>
          <span>Đơn hàng</span>
        </li>
        <li class="menu-item admin-only" data-page="products">
          <i class="fas fa-boxes-stacked"></i>
          <span>Sản phẩm</span>
        </li>
        <li class="menu-item admin-only" data-page="combos">
          <i class="fas fa-gift"></i>
          <span>Combo/KM</span>
        </li>
        <li class="menu-item admin-only" data-page="customers">
          <i class="fas fa-users"></i>
          <span>Khách hàng</span>
        </li>
        <li class="menu-item" data-page="stats">
          <i class="fas fa-chart-line"></i>
          <span>Thống kê</span>
        </li>
        <li class="menu-item admin-only" data-page="employees">
          <i class="fas fa-user-shield"></i>
          <span>Nhân viên</span>
        </li>
        <li class="menu-item" data-page="shifts">
          <i class="fas fa-clock"></i>
          <span>Ca làm việc</span>
        </li>
      </ul>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">
            <i class="fas fa-user-circle"></i>
          </div>
          <div class="user-details">
            <span id="user-display-name" class="user-name">Admin</span>
            <span id="user-display-role" class="user-role">Quản trị viên</span>
          </div>
        </div>
        <div class="sidebar-actions">
          <button id="btn-backup" class="btn-icon admin-only" title="Sao lưu dữ liệu">
            <i class="fas fa-database"></i>
          </button>
          <button id="btn-logout" class="btn-icon" title="Đăng xuất">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <div class="top-bar-left">
          <button id="sidebar-toggle" class="btn-icon">
            <i class="fas fa-bars"></i>
          </button>
          <h2 id="page-title">Tổng quan</h2>
        </div>
        <div class="top-bar-right">
          <div class="current-time">
            <i class="fas fa-clock"></i>
            <span id="current-time"></span>
          </div>
        </div>
      </header>

      <!-- Page Container -->
      <div id="page-container" class="page-container">
        <!-- Pages will be loaded here dynamically -->
      </div>
    </main>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div id="modal-content" class="modal-content">
      <!-- Modal content will be injected here -->
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script src="js/pos.js"></script>
  <script src="js/customers.js"></script>
  <script src="js/orders.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/employees.js"></script>
  <script src="js/shifts.js"></script>
  <script src="js/combos.js"></script>
  <script src="js/printer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
